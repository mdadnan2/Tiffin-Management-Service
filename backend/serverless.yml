service: tiffin-management-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  
  # Lambda configuration
  memorySize: 1024
  timeout: 30
  
  # Environment variables
  environment:
    NODE_ENV: production
    DATABASE_URL: ${param:DATABASE_URL, ''}
    JWT_SECRET: ${param:JWT_SECRET, 'your-super-secret-jwt-key-change-in-production'}
    JWT_EXPIRATION: ${param:JWT_EXPIRATION, '15m'}
    JWT_REFRESH_SECRET: ${param:JWT_REFRESH_SECRET, 'your-super-secret-refresh-key-change-in-production'}
    JWT_REFRESH_EXPIRATION: ${param:JWT_REFRESH_EXPIRATION, '7d'}
    FRONTEND_URL: ${param:FRONTEND_URL, 'https://tiffin-management-service.vercel.app'}
  
  # IAM permissions
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

# Lambda function
functions:
  api:
    handler: src/lambda.handler
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true
      - http:
          path: /
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true

# Packaging
package:
  individually: false

# Plugins
plugins:
  - serverless-webpack
  - serverless-offline

# Custom configuration
custom:
  webpack:
    webpackConfig: 'webpack.config.js'
    includeModules:
      forceExclude:
        - aws-sdk
    packager: 'npm'
  serverless-offline:
    httpPort: 3001
